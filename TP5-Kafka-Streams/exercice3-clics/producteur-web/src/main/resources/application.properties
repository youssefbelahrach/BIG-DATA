# TP5 - Exercice 3 - Producteur Web
# Le consommateur REST occupe le port 8080 (conformément au test curl du TP),
# le producteur web est donc lancé sur le port 8081.
server.port=8081

spring.application.name=producteur-web

# Connexion au broker Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Sérialisation des clés et des valeurs (String)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
