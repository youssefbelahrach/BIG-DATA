<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP5 - Producteur de clics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #101418;
            color: #e8edf2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a2027;
            border: 1px solid #2c3640;
            border-radius: 12px;
            padding: 40px 48px;
            text-align: center;
            max-width: 420px;
        }
        h1 { font-size: 1.3rem; margin-bottom: 6px; }
        p.sub { color: #8ea0b0; font-size: 0.9rem; margin-bottom: 28px; }
        select {
            background: #101418;
            color: #e8edf2;
            border: 1px solid #2c3640;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        button {
            display: block;
            width: 100%;
            background: #2f81f7;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #4a93ff; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 20px; color: #7ee787; font-size: 0.9rem; min-height: 1.2em; }
        #local { margin-top: 6px; color: #8ea0b0; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Comptage de clics — Kafka Streams</h1>
        <p class="sub">Chaque clic envoie un événement dans le topic <b>clicks</b></p>

        <label for="userId">Utilisateur :</label>
        <select id="userId">
            <option value="user1">user1</option>
            <option value="user2">user2</option>
            <option value="user3">user3</option>
        </select>

        <button id="clickBtn">Cliquez ici</button>

        <div id="status"></div>
        <div id="local"></div>
    </div>

    <script>
        let localCount = 0;
        const btn = document.getElementById("clickBtn");
        const status = document.getElementById("status");
        const local = document.getElementById("local");

        btn.addEventListener("click", async () => {
            const userId = document.getElementById("userId").value;
            try {
                const res = await fetch("/click?userId=" + encodeURIComponent(userId), {
                    method: "POST"
                });
                const data = await res.json();
                localCount++;
                status.textContent = "Événement envoyé : key=" + data.key + ", value=" + data.value;
                local.textContent = "Clics envoyés depuis cette page : " + localCount;
            } catch (e) {
                status.style.color = "#ff7b72";
                status.textContent = "Erreur : impossible de contacter le serveur.";
            }
        });
    </script>
</body>
</html>
