# TP5 - Exercice 3 - Consommateur REST
# Port 8080 pour correspondre au test du TP :
#   curl http://localhost:8080/clicks/count
server.port=8080

spring.application.name=consommateur-rest

# Connexion au broker Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Désérialisation des clés et des valeurs (String)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Lire depuis le début du topic au premier démarrage
# pour récupérer les derniers comptages déjà publiés
spring.kafka.consumer.auto-offset-reset=earliest
